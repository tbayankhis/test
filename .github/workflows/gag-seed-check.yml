name: GAG Seed Restock Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check seed stock and notify Telegram
        run: |
          node <<'NODE'
          const BOT_TOKEN = process.env.TELEGRAM_BOT_TOKEN;
          const CHAT_ID = process.env.TELEGRAM_CHAT_ID;

          const API_URL = "https://gag.gg/api/ext/sync";

          // Seeds we care about, with their display emoji.
          const TARGETS = [
            { name: "Moon Bloom", emoji: "🌙" },
            { name: "Dragon's Breath", emoji: "🐉" },
          ];

          async function sendTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            const res = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text,
                disable_web_page_preview: true,
              }),
            });

            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Telegram failed: ${res.status} ${err}`);
            }
          }

          const res = await fetch(API_URL, {
            headers: {
              "Accept": "application/json",
              "User-Agent": "GitHub-Actions-Stock-Checker"
            }
          });

          if (!res.ok) {
            throw new Error(`API failed: ${res.status}`);
          }

          const data = await res.json();
          const seeds = data.seeds || [];

          // Wanted seeds that are in stock right now.
          const notify = TARGETS
            .map(t => {
              const item = seeds.find(s => s.name === t.name && s.inStockNow === true);
              return item ? { ...t, lastQty: item.lastQty ?? "-" } : null;
            })
            .filter(Boolean);

          if (notify.length === 0) {
            console.log("No wanted seeds in stock. No notification sent.");
            process.exit(0);
          }

          let msg = "🚨🚨 WANTED SEEDS FOUND! 🚨🚨\n";
          for (const seed of notify) {
            msg += `\n${seed.emoji} ${seed.name}\n📦 Qty: ${seed.lastQty}\n`;
          }

          await sendTelegram(msg.trimEnd());
          console.log("Wanted seed found:", notify.map(x => x.name).join(", "));
          NODE
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
